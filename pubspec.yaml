name: ai_workspace
description: A local‑first AI productivity platform (Chat MVP).
publish_to: 'none' # this is a private package
version: 0.1.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.3.6
  http: ^1.1.0
  go_router: ^10.2.0
  intl: ^0.20.2
  # pdf_text: ^0.5.0
  flutter_secure_storage: ^8.1.0
  # Drift for SQLite with encryption support
  drift: ^2.9.0
  drift_sqflite: ^2.0.1
  path_provider: ^2.0.15
  hive: ^2.2.3
  sqlite3_flutter_libs: ^0.5.5
  pdf: ^3.10.8
  path: ^1.9.0
  url_launcher: ^6.2.0
  open_filex: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  drift_dev: ^2.9.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/vyaas_app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/vyaas_app_icon.png
  fonts:

    - family: Times New Roman
      fonts:
        - asset: assets/fonts/Tinos-Regular.ttf
        - asset: assets/fonts/Tinos-Italic.ttf
          style: italic
        - asset: assets/fonts/Tinos-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tinos-BoldItalic.ttf
          weight: 700
          style: italic
